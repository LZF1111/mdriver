<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>MDriver · Render Harness</title>
  <style>
    html, body { margin: 0; height: 100%; background: #07040f; overflow: hidden; }
    #stage { position: absolute; inset: 0; }
    #hud { position: absolute; left: 12px; top: 10px; color: #9aa0b5;
      font: 12px/1.4 -apple-system, "Segoe UI", monospace; z-index: 10; opacity: .8; }
  </style>
  <script src="https://unpkg.com/ngl@2.3.1/dist/ngl.js"></script>
</head>
<body>
  <div id="stage"></div>
  <div id="hud">loading…</div>
  <script>
    const PAL = ['C','H','O','N','S','P','F','Cl','Na','Mg','Al','Si','K','Ca','Fe','Zn','Cu','Ar'];
    function pickCol(idx, names){ for (const n of names) if (idx[n] !== undefined) return idx[n]; return undefined; }
    function pdbLine(serial, el, x, y, z){
      const E = String(el||'C').toUpperCase().replace(/[^A-Z]/g,'')||'C';
      const ser = String(serial%100000).padStart(5);
      const name = (E.length>=4 ? E.slice(0,4) : (' '+E).padEnd(4));
      const xs=(Number.isFinite(x)?x:0).toFixed(3).padStart(8);
      const ys=(Number.isFinite(y)?y:0).toFixed(3).padStart(8);
      const zs=(Number.isFinite(z)?z:0).toFixed(3).padStart(8);
      const elem=E.padStart(2).slice(0,2);
      return 'ATOM  '+ser+' '+name+' MOL A   1    '+xs+ys+zs+'  1.00  0.00          '+elem;
    }
    function framesToPdb(frames){
      let out=''; let m=0;
      for (const fr of frames){
        m++; out+='MODEL     '+String(m).padStart(4)+'\n'; let serial=0;
        for (const at of fr.atoms){
          serial++; let el=at.t;
          if (/^\d+$/.test(String(el))){ const n=parseInt(el,10); el=PAL[(n-1)%PAL.length]||'C'; }
          out+=pdbLine(serial, el, at.x, at.y, at.z)+'\n';
        }
        out+='ENDMDL\n';
      }
      out+='END\n'; return out;
    }
    function lammpstrjToPdb(text){
      const lines=text.split(/\r?\n/); const N=lines.length; let i=0; const frames=[];
      while (i<N){
        if (!/^ITEM:\s*TIMESTEP/i.test(lines[i]||'')){ i++; continue; }
        i++; i++;
        while (i<N && !/^ITEM:\s*NUMBER OF ATOMS/i.test(lines[i])) i++;
        i++; const natoms=parseInt((lines[i]||'0').trim(),10)||0; i++;
        let box=null;
        if (/^ITEM:\s*BOX BOUNDS/i.test(lines[i]||'')){ i++; const bl=[];
          for (let k=0;k<3&&i<N;k++){ bl.push((lines[i]||'').trim().split(/\s+/).map(Number)); i++; } box=bl; }
        while (i<N && !/^ITEM:\s*ATOMS/i.test(lines[i])) i++;
        const header=(lines[i]||'').replace(/^ITEM:\s*ATOMS\s*/i,'').trim().split(/\s+/); i++;
        const idx={}; header.forEach((h,k)=>idx[h]=k);
        const cx=pickCol(idx,['x','xu','xs','xsu']), cy=pickCol(idx,['y','yu','ys','ysu']), cz=pickCol(idx,['z','zu','zs','zsu']);
        const ct=idx.element!==undefined?idx.element:(idx.type!==undefined?idx.type:-1);
        const scaled=cx!==undefined&&(header[cx]==='xs'||header[cx]==='xsu');
        if (cx===undefined||cy===undefined||cz===undefined){ i+=natoms; continue; }
        const atoms=[];
        for (let a=0;a<natoms&&i<N;a++,i++){
          const parts=(lines[i]||'').trim().split(/\s+/);
          if (parts.length<header.length) continue;
          let x=parseFloat(parts[cx]),y=parseFloat(parts[cy]),z=parseFloat(parts[cz]);
          if (scaled&&box){ x=box[0][0]+x*(box[0][1]-box[0][0]); y=box[1][0]+y*(box[1][1]-box[1][0]); z=box[2][0]+z*(box[2][1]-box[2][0]); }
          atoms.push({ t: ct>=0?parts[ct]:'1', x, y, z });
        }
        frames.push({ atoms });
      }
      return { text: framesToPdb(frames), frames: frames.length };
    }

    const params = new URLSearchParams(location.search);
    const path = params.get('path') || 'dump.atom';
    const hud = document.getElementById('hud');
    let stage, comp, trajComp, totalFrames = 1;

    window.__ready = false;

    (async () => {
      stage = new NGL.Stage('stage', { backgroundColor: '#07040f', cameraType: 'perspective' });
      window.addEventListener('resize', () => stage.handleResize());
      const url = '/api/traj?path=' + encodeURIComponent(path) + '&_t=' + Date.now();
      const txt = await (await fetch(url)).text();
      const conv = lammpstrjToPdb(txt);
      hud.textContent = conv.frames + ' frames';
      const blob = new Blob([conv.text], { type: 'text/plain' });
      comp = await stage.loadFile(blob, { ext: 'pdb', defaultRepresentation: false, asTrajectory: conv.frames > 1 });
      comp.addRepresentation('spacefill', { colorScheme: 'element', radiusScale: 0.55, roughness: 0.35, metalness: 0.0 });
      const frames = comp.structure && comp.structure.frames;
      if (frames && frames.length > 1) { trajComp = comp.addTrajectory(); totalFrames = frames.length; }
      comp.autoView();
      // a touch of cinematic lighting
      stage.setParameters({ clipNear: 0, clipFar: 100, fogNear: 60, fogFar: 100, lightIntensity: 1.1, ambientIntensity: 0.35 });
      window.__ready = true;
      hud.textContent = 'ready · ' + totalFrames + ' frames';
    })();

    window.__setFrame = (i) => {
      if (!trajComp) return;
      const idx = ((i % totalFrames) + totalFrames) % totalFrames;
      try { trajComp.trajectory.setFrame(idx); } catch (e) {}
    };

    // Multi-angle rotating + zoom-breathing demo, recorded to webm.
    window.__recordDemo = (durationMs = 12000, fps = 30) => new Promise((resolve, reject) => {
      try {
        const canvas = stage.viewer.renderer.domElement;
        const stream = canvas.captureStream(fps);
        let mime = 'video/webm;codecs=vp9';
        if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8';
        if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';
        const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 6_000_000 });
        const chunks = [];
        rec.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
        rec.onstop = async () => {
          const out = new Blob(chunks, { type: 'video/webm' });
          window.__lastBlob = out;
          // upload base64 to the dev server (download channel is unreliable in embedded browser)
          try {
            const buf = new Uint8Array(await out.arrayBuffer());
            let bin = ''; const CH = 0x8000;
            for (let i = 0; i < buf.length; i += CH) bin += String.fromCharCode.apply(null, buf.subarray(i, i + CH));
            const b64 = btoa(bin);
            const r = await fetch('/api/file', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ path: '_mdriver_demo_b64.txt', content: b64 })
            });
            const j = await r.json();
            resolve({ bytes: out.size, b64len: b64.length, uploaded: j.ok === true, mime });
          } catch (err) { resolve({ bytes: out.size, mime, uploadError: String(err) }); }
        };
        const ctrl = stage.viewerControls;
        const t0 = performance.now();
        let lastFrameSet = -1;
        function tick(now) {
          const t = (now - t0) / 1000;
          // continuous yaw + gentle tumble => multi-angle
          ctrl.spin([0, 1, 0], 0.016);
          ctrl.spin([1, 0, 0], 0.006 * Math.sin(t * 0.6));
          // zoom breathing (cos integrates to bounded motion)
          ctrl.zoom(Math.cos(t * 0.55) * 0.9);
          // advance trajectory smoothly across the whole clip
          const fi = Math.floor((t / (durationMs / 1000)) * totalFrames * 2) % totalFrames;
          if (fi !== lastFrameSet) { window.__setFrame(fi); lastFrameSet = fi; }
          stage.viewer.requestRender();
          if (now - t0 < durationMs) requestAnimationFrame(tick);
          else rec.stop();
        }
        rec.start();
        requestAnimationFrame(tick);
      } catch (e) { reject(e); }
    });

    // Capture a rotating multi-angle loop as a single JPEG sprite-sheet (codec-free flipbook).
    window.__captureSheet = async (cols = 9, rows = 8, cell = 400, q = 0.74) => {
      const total = cols * rows;
      const src = stage.viewer.renderer.domElement;
      const ctrl = stage.viewerControls;
      const sheet = document.createElement('canvas');
      sheet.width = cols * cell; sheet.height = rows * cell;
      const sctx = sheet.getContext('2d');
      const tmp = document.createElement('canvas'); tmp.width = cell; tmp.height = cell;
      const tctx = tmp.getContext('2d');
      comp.autoView();
      stage.viewer.requestRender();
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      for (let i = 0; i < total; i++) {
        const u = i / total;                 // 0..1 over the seamless loop
        if (totalFrames > 1) window.__setFrame(Math.floor(u * totalFrames));
        ctrl.spin([0, 1, 0], (Math.PI * 2) / total);      // exactly one full turn => seamless
        ctrl.spin([1, 0, 0], 0.018 * Math.sin(u * Math.PI * 2)); // gentle tumble, net 0
        ctrl.zoom(Math.cos(u * Math.PI * 2) * 0.7);         // zoom breathing, net 0
        stage.viewer.requestRender();
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        const s = Math.min(src.width, src.height);
        const sx = (src.width - s) / 2, sy = (src.height - s) / 2;
        tctx.fillStyle = '#07040f'; tctx.fillRect(0, 0, cell, cell);
        tctx.drawImage(src, sx, sy, s, s, 0, 0, cell, cell);
        const col = i % cols, row = Math.floor(i / cols);
        sctx.drawImage(tmp, col * cell, row * cell);
        hud.textContent = 'sheet ' + (i + 1) + '/' + total;
      }
      const b64 = sheet.toDataURL('image/jpeg', q).split(',')[1];
      const r = await fetch('/api/file', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: '_mdriver_sheet_b64.txt', content: b64 })
      });
      const j = await r.json();
      hud.textContent = 'sheet done · ' + total + ' frames';
      return { cols, rows, cell, total, sheetW: sheet.width, sheetH: sheet.height, b64len: b64.length, uploaded: j.ok === true };
    };

    window.__poster = () => stage.viewer.renderer.domElement.toDataURL('image/png');
    window.__posterDark = () => {
      const src = stage.viewer.renderer.domElement;
      const c = document.createElement('canvas');
      c.width = src.width; c.height = src.height;
      const ctx = c.getContext('2d');
      const g = ctx.createLinearGradient(0, 0, 0, c.height);
      g.addColorStop(0, '#0c0820'); g.addColorStop(1, '#07040f');
      ctx.fillStyle = g; ctx.fillRect(0, 0, c.width, c.height);
      ctx.drawImage(src, 0, 0);
      return c.toDataURL('image/png');
    };

    // Export a decimated multi-model PDB as a static asset for the live web viewer.
    window.__exportPdb = async (stride = 4) => {
      const url = '/api/traj?path=' + encodeURIComponent(path) + '&_t=' + Date.now();
      const txt = await (await fetch(url)).text();
      const conv = lammpstrjToPdb(txt);
      const models = conv.text.split('ENDMDL\n').filter(s => s.includes('MODEL'));
      let out = ''; let m = 0;
      for (let i = 0; i < models.length; i += stride) {
        m++;
        const body = models[i].replace(/^MODEL\s+\d+\n/, '');
        out += 'MODEL     ' + String(m).padStart(4) + '\n' + body + 'ENDMDL\n';
      }
      out += 'END\n';
      const r = await fetch('/api/file', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: '_traj_pdb.txt', content: out })
      });
      const j = await r.json();
      return { kept: m, of: models.length, chars: out.length, uploaded: j.ok === true };
    };
  </script>
</body>
</html>
